version: '3.8'

# ---------------------------------------------------------------------------
# Enterprise Privacy Compliance Orchestrator
# Zero-trust multi-agent system for continuous PII auditing
# ---------------------------------------------------------------------------

networks:
  compliance-net:
    driver: bridge

volumes:
  kafka-data:
  zookeeper-data:
  zookeeper-log:
  prometheus-data:

services:

  # ---------------------------------------------------------------------------
  # Zookeeper (Kafka coordination)
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    networks:
      - compliance-net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ---------------------------------------------------------------------------
  # Kafka broker
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    networks:
      - compliance-net
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092"
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ---------------------------------------------------------------------------
  # Agent Engine (Python) – PII detection, compliance engine, XAI
  # ---------------------------------------------------------------------------
  agent_engine:
    build:
      context: ./services/agent_engine
      dockerfile: Dockerfile
    hostname: agent-engine
    networks:
      - compliance-net
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:29092
      DATA_TOPIC: enterprise_data_stream
      ALERT_TOPIC: compliance_alerts
      AUDIT_TOPIC: audit_trail
      HEALTH_PORT: 8080
      KAFKA_MAX_RETRIES: 15
      KAFKA_RETRY_BACKOFF_S: 5
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FL_CLIENT_ID: ${FL_CLIENT_ID:-agent-engine-01}
      FL_SERVER_URL: ${FL_SERVER_URL:-https://fl-server.internal/api/v1}
      FL_DP_NOISE_SCALE: ${FL_DP_NOISE_SCALE:-0.1}
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ---------------------------------------------------------------------------
  # API Gateway (Node.js/TypeScript) – Slack + Teams integration
  # ---------------------------------------------------------------------------
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    hostname: gateway
    networks:
      - compliance-net
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      KAFKA_BROKER: kafka:29092
      ALERT_TOPIC: compliance_alerts
      REMEDIATION_TOPIC: remediation_actions
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Slack
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID:-#compliance-alerts}
      # Microsoft Teams
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL:-}
      NODE_ENV: ${NODE_ENV:-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Prometheus – metrics scraping for all services
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    hostname: prometheus
    networks:
      - compliance-net
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M